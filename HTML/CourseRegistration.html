
<!DOCTYPE html>
<html>
<head>
    <title>Course Registration Form</title>
</head>
<body>

    <h2>Course Registration Form</h2>

    <form>

        <label>Student Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Roll Number:</label><br>
        <input type="text" name="rollno" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <label>Select Course:</label><br>
        <select name="course">
            <option value="">--Choose Course--</option>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="C">C Programming</option>
            <option value="Web Development">Web Development</option>
            <option value="Data Science">Data Science</option>
        </select>
        <br><br>

        <label>Preferred Timing:</label><br>
        <input type="checkbox" name="timing" value="Morning"> Morning
        <input type="checkbox" name="timing" value="Afternoon"> Afternoon
        <input type="checkbox" name="timing" value="Evening"> Evening
        <br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30"></textarea>
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
